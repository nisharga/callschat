version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: callschat-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-callschat}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - callschat-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: callschat-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - callschat-network

  # Backend API
  backend:
    build:
      context: ../../backend
      dockerfile: ../../infrastructure/docker/Dockerfile.backend
    container_name: callschat-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-callschat}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      TURN_SERVER_URL: ${TURN_SERVER_URL}
      TURN_USERNAME: ${TURN_USERNAME}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL}
      STUN_SERVER_URL: ${STUN_SERVER_URL:-stun:stun.l.google.com:19302}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
      - "3002:3002" # WebSocket port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - callschat-network
    command: npm run start:dev

  # Web App (Next.js)
  web-app:
    build:
      context: ../../apps/web-app
      dockerfile: ../../infrastructure/docker/Dockerfile.webapp
    container_name: callschat-web-app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
      NEXT_PUBLIC_WS_URL: ws://localhost:${BACKEND_PORT:-3001}
    ports:
      - "${WEB_APP_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ../../apps/web-app:/app
      - /app/node_modules
      - /app/.next
    networks:
      - callschat-network
    command: npm run dev

  # Admin Panel
  admin-panel:
    build:
      context: ../../apps/admin-panel
      dockerfile: ../../infrastructure/docker/Dockerfile.admin
    container_name: callschat-admin-panel
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
      NEXT_PUBLIC_WS_URL: ws://localhost:${BACKEND_PORT:-3001}
    ports:
      - "${ADMIN_PANEL_PORT:-3002}:3000"
    depends_on:
      - backend
    volumes:
      - ../../apps/admin-panel:/app
      - /app/node_modules
      - /app/.next
    networks:
      - callschat-network
    command: npm run dev

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: callschat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - web-app
      - admin-panel
    networks:
      - callschat-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  callschat-network:
    driver: bridge
